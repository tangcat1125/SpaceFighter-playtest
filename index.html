<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>BambooPrincess - Playtest</title>
    <link rel="stylesheet" href="./BambooPrincess/playtest/styles.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="game" width="480" height="800" aria-label="BambooPrincess playtest"></canvas>
      <div id="overlay" aria-hidden="true">
        <div id="hint">
          <div class="line">方向鍵 / WASD 移動，Space 射擊，Shift 慢速；數字 1~4 切換武器</div>
          <div class="line">左下角為雲層/風向提示（目前僅視覺效果）</div>
        </div>
      </div>
    </div>
    <script src="./BambooPrincess/playtest/main.js"></script>
  </body>
</html>
